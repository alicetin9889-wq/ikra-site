<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İkra 💞</title>

<style>

body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ff4d6d,#ff8fab,#ffc2d1);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
position:relative;
width:90%;
max-width:420px;
padding:25px;
border-radius:30px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(255,255,255,0.3);
text-align:center;
animation:fade 1s;
z-index:2;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:34px;
margin-bottom:15px;
}

.text{
font-size:19px;
line-height:1.7;
min-height:260px;
animation:fade 1s;
}

button{
padding:12px 28px;
border:none;
border-radius:25px;
font-size:17px;
background:white;
color:#ff4d88;
font-weight:bold;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

.heart{
position:absolute;
font-size:22px;
animation:float 7s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-120vh);
opacity:1;
}
}

.ikos{
position:absolute;
font-size:18px;
opacity:0.15;
font-weight:bold;
animation:spin 10s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.jackimg{
width:120px;
border-radius:20px;
margin-top:15px;
box-shadow:0 0 15px rgba(255,255,255,0.4);
}

</style>
</head>

<body>

<div class="heart" style="left:10%; animation-delay:0s;">💞</div>
<div class="heart" style="left:25%; animation-delay:2s;">💖</div>
<div class="heart" style="left:40%; animation-delay:1s;">💕</div>
<div class="heart" style="left:70%; animation-delay:3s;">💘</div>
<div class="heart" style="left:85%; animation-delay:5s;">💗</div>

<div class="ikos" style="top:10%; left:5%;">ikos 💞</div>
<div class="ikos" style="top:70%; left:75%;">ikos 💞</div>
<div class="ikos" style="top:40%; left:80%;">ikos 💞</div>

<div class="container">

<h1>✉️ Ali’den İkra’ya</h1>

<div class="text" id="text">
İkra… 💞<br><br>

Seninle konuşmak beklediğimden fazla güzel geldi bana.<br><br>

Hot Wheels muhabbetlerimiz, random konuşmalarımız falan istemeden günümün parçası oldu 😭<br><br>

Bir de yeşil gözlerin var tabii… hâlâ fazla iyi bence.
</div>

<button onclick="nextScene()">Devam Et 💌</button>

</div>

<script>

let step = 0;

function nextScene(){

const text = document.getElementById("text");

step++;

if(step == 1){

text.innerHTML = `
Şu mobil oyun olayını sevmemem bile biraz kıskançlıktan galiba 😭<br><br>

Çünkü seni bazen herkesten biraz daha farklı görüyorum.<br><br>

Ve attığın küçücük mesajlar bile insanın gününü değiştirebiliyor.
`;

}

else if(step == 2){

text.innerHTML = `
🎂 İyi ki doğdun İkra 💞<br><br>

Umarım hep mutlu olursun.<br><br>

Ve şimdi Jack’in mesajı geliyor...
`;

}

else if(step == 3){

text.innerHTML = `
🧑‍⚕️<br><br>

“İkra, Ali’yi üzme.<br><br>

Adam sana düşmüş 😭”<br><br>

— Dr. Jack Shephard<br><br>

<img class="jackimg" src="https://upload.wikimedia.org/wikipedia/en/5/52/Jack_Shephard.jpg">
`;

}

}

</script>

</body>
</html>
